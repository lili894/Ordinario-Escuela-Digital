<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Escuela Digital</title>

<style>
body{
    margin:0;
    font-family: Fredoka, sans-serif;
    background:#f2f2f2;
}

.container{
    display:flex;
    height:100vh;
    width:100%;
    margin:0;
}


.izquierda{
    width:50%;
    background:#2f4a8a;
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:40px;
}

.logo-img{
    width:90px;
}

.logo{
    font-size:27px;
    font-weight:bold;
}

.subtexto{
    font-size:14px;
    margin-top:10px;
    opacity:0.8;
    max-width:400px;
}

.imagen{
    width:65%;
    height:400px;
    object-fit:cover;
    margin-top:20px;
    border-radius:12px;
    box-shadow:0px 5px 15px rgba(0,0,0,0.4);
}


.derecha{
    width:40%;
    background:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:80px;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

form{
    display:flex;
    flex-direction:column;
}

label{
    margin-top:10px;
    font-size:14px;
}

input, select{
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:6px;
    outline:none;
}

input:focus, select:focus{
    border-color:#2f4a8a;
}

button{
    margin-top:20px;
    padding:12px;
    background:#2f4a8a;
    color:white;
    border:none;
    cursor:pointer;
    border-radius:6px;
    font-size:15px;
    transition:0.3s;
}

button:hover{
    background:#1f3363;
}

.mensaje{
    margin-top:15px;
    text-align:center;
    font-size:14px;
    color:green;
}
</style>
</head>

<body>

<div class="container">


<div class="izquierda">

    <img src="LogoEscuela.png" class="logo-img">

    <div class="logo">Escuela Digital</div>
    <div class="subtexto">
        Formando profesionales en tecnología, diseño y desarrollo digital.
    </div>

    <img src="Escuela.jpg" class="imagen">
</div>


<div class="derecha">
    <h2>Formulario de Registro</h2>

    <form id="formulario">

        <label>Nombre</label>
        <input type="text" placeholder="Nombre" id="nombre" required>

        <label>Apellido</label>
        <input type="text" placeholder="Apellido" id="apellido" required>

        <label>Teléfono</label>
        <input type="text" placeholder="Teléfono" id="telefono" required>

        <label>Correo</label>
        <input type="text" placeholder="Correo" id="correo" required>

        <label>Carrera</label>
        <select id="carrera">
            <option>Diseño Gráfico Digital</option>
            <option>Programación Web</option>
            <option>Marketing Digital</option>
            <option>Animación Digital</option>
        </select>

        <button type="submit">Enviar Registro</button>

    </form>
</div>

</div>

<script>

const url = "https://script.google.com/macros/s/AKfycbylRhh9JGolRLu3e1S2VXL_UeyitZXH7tvzWkVLCM6pTR3E6cgcguDJsEmunhDKHU5Y/exec";

document.getElementById("formulario").addEventListener("submit", function(e){

    e.preventDefault();

    const datos = {
        nombre: document.getElementById("nombre").value,
        apellido: document.getElementById("apellido").value,
        telefono: document.getElementById("telefono").value,
        correo: document.getElementById("correo").value,
        carrera: document.getElementById("carrera").value
    };

    fetch(url,{
        method:"POST",
        body: JSON.stringify(datos)
    })
    .then(res => res.text())
    .then(data=>{
        alert("Registro enviado correctamente");
        document.getElementById("formulario").reset();
    })
    .catch(error=>{
        alert("Error al enviar registro");
        console.error(error);
    });

});
</script>

</body>
</html>
